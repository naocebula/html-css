<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Listas</title>
</head>
<body>
    <h1>Listas ordenadas</h1>
    <ol type="1" start="3">
        <li>Madeira </li>
        <li>Cola</li>
        <li>Prego</li>
        <li>Tinta</li>
        <li>Pincel</li>
    </ol>
    <!--Mudando o 1 para i ordena em nº romano ou A, a-->
    <h2>Lista Não ordenadas</h2>
    <ul type="square">
        <li>Casa</li>
        <li>Carro</li>
        <li>Pedra</li>
        <li>Telha</li>
    </ul>
    <!--Opcões disc, circle, square-->
</body>
</html>
