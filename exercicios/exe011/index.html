<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias imagens

    </title>
</head>
<body>
    <h1>Imageem dinamica</h1>
    <p>Tente abrir este site em diispositivo diferentes ou simplesmente aumente
     e diminua o tamanho do seu navegador</p>
     <picture>
        <source media="(max-width: 550px)" srcset="imagem/foto-p.png" type="image/png">
        <source media="(max-width: 750px)" srcset="imagem/foto-ro.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imagem/foto-m.png" type="image/png">
        <img src="imagem/foto-g.png" alt="Imagem flexivel">
     </picture>
    
</body>
</html>
